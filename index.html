<body class="home">

<!-- background layer with subtle starfield -->
<div class="background"></div>

<!-- Brand mark -->
<a href="/" class="brand-mark is-visible" id="brandMark" aria-label="River &amp; Oyster — home">
  <img src="images/logo.png" alt="River &amp; Oyster" class="brand-logo">
</a>

<!-- Language switch -->
<div class="lang-switch lang-switch--home is-visible" aria-label="Language">
  <span class="lang-switch__opt is-active">EN</span>
  <span class="lang-switch__sep">/</span>
  <a class="lang-switch__opt" href="/cz/">CZ</a>
</div>

<!-- Constellation stage — Pleiades navigation -->
<div class="stage is-visible" id="stage">
  <!--
    Pleiades — Seven Sisters (M45). Star positions roughly follow the real
    visual cluster: Alcyone in the centre, Atlas and Pleione tight together
    south-east, Maia and Taygeta clustered upper-left, Electra south-west,
    Merope south of centre. The shape reads as a tight little dipper.
  -->
  <svg class="pleiades" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" aria-label="Pleiades — navigation">

    <!-- Connecting lines — the small dipper outline of M45 -->
    <g class="p-lines">
        <!-- bowl of the dipper -->
        <line class="p-line" x1="290" y1="170" x2="410" y2="210"/>
        <line class="p-line" x1="410" y1="210" x2="475" y2="300"/>
        <line class="p-line" x1="475" y1="300" x2="430" y2="410"/>
        <line class="p-line" x1="430" y1="410" x2="245" y2="380"/>
        <line class="p-line" x1="245" y1="380" x2="290" y2="170"/>
        <!-- handle of the dipper (Alcyone → Atlas → Pleione, tight pair) -->
        <line class="p-line" x1="475" y1="300" x2="615" y2="340"/>
        <line class="p-line" x1="615" y1="340" x2="640" y2="305"/>
      </g>

      <a href="/food" class="p-star" data-name="Food">
        <circle class="p-star-halo" cx="475" cy="300" r="15"/>
        <circle class="p-star-core" cx="475" cy="300" r="4.8"/>
        <circle class="p-star-hit"  cx="475" cy="300" r="36"/>
        <text class="p-label"     x="500" y="304">Food</text>
        <text class="p-label-sub" x="500" y="286">Food Experience</text>
      </a>

      <a href="/visit" class="p-star" data-name="Visit">
        <circle class="p-star-halo" cx="615" cy="340" r="12"/>
        <circle class="p-star-core" cx="615" cy="340" r="4"/>
        <circle class="p-star-hit"  cx="615" cy="340" r="32"/>
        <text class="p-label"     x="635" y="360">Visit</text>
        <text class="p-label-sub" x="635" y="378">Find us</text>
      </a>

      <a href="/discover" class="p-star" data-name="Discover">
        <circle class="p-star-halo" cx="640" cy="305" r="9"/>
        <circle class="p-star-core" cx="640" cy="305" r="3"/>
        <circle class="p-star-hit"  cx="640" cy="305" r="26"/>
        <text class="p-label"     x="660" y="298">Discover</text>
        <text class="p-label-sub" x="660" y="316">Social · events</text>
      </a>

      <a href="/chef" class="p-star" data-name="Chef">
        <circle class="p-star-halo" cx="410" cy="210" r="12"/>
        <circle class="p-star-core" cx="410" cy="210" r="3.8"/>
        <circle class="p-star-hit"  cx="410" cy="210" r="32"/>
        <text class="p-label"     x="430" y="206">Chef</text>
        <text class="p-label-sub" x="430" y="224">The kitchen</text>
      </a>

      <a href="/private-dining" class="p-star" data-name="Private Dining">
        <circle class="p-star-halo" cx="290" cy="170" r="10"/>
        <circle class="p-star-core" cx="290" cy="170" r="3.4"/>
        <circle class="p-star-hit"  cx="290" cy="170" r="30"/>
        <text class="p-label"     x="278" y="166" text-anchor="end">Private Dining</text>
        <text class="p-label-sub" x="278" y="184" text-anchor="end">Events &amp; buyouts</text>
      </a>

      <a href="/drink" class="p-star" data-name="Drink">
        <circle class="p-star-halo" cx="245" cy="380" r="12"/>
        <circle class="p-star-core" cx="245" cy="380" r="3.8"/>
        <circle class="p-star-hit"  cx="245" cy="380" r="32"/>
        <text class="p-label"     x="233" y="386" text-anchor="end">Drink</text>
        <text class="p-label-sub" x="233" y="404" text-anchor="end">Wine · champagne</text>
      </a>

      <a href="/book" class="p-star" data-name="Book">
        <circle class="p-star-halo" cx="430" cy="410" r="13"/>
        <circle class="p-star-core" cx="430" cy="410" r="4.2"/>
        <circle class="p-star-hit"  cx="430" cy="410" r="34"/>
        <text class="p-label"     x="450" y="430">Book</text>
        <text class="p-label-sub" x="450" y="448">Reserve a table</text>
      </a>

      <!-- Faint companion stars -->
      <circle class="p-star-core" cx="355" cy="260" r="1.8" opacity="0.45"/>
      <circle class="p-star-core" cx="365" cy="160" r="1.5" opacity="0.4"/>
      <circle class="p-star-core" cx="540" cy="245" r="1.4" opacity="0.35"/>
      <circle class="p-star-core" cx="520" cy="375" r="1.6" opacity="0.4"/>
      <circle class="p-star-core" cx="200" cy="290" r="1.4" opacity="0.35"/>
    <circle class="p-star-core" cx="710" cy="240" r="1.5" opacity="0.4"/>
    <circle class="p-star-core" cx="755" cy="395" r="1.3" opacity="0.3"/>
    <circle class="p-star-core" cx="145" cy="445" r="1.4" opacity="0.35"/>

  </svg>
</div>

<!-- Bottom utility bar -->
<div class="home-footer is-visible" id="homeFooter">
  <div>
    Est. 2011
  </div>
  <div>
    River <span style="opacity:0.6;">&amp;</span> Oyster · Prague
  </div>
  <div>
    <a href="https://www.instagram.com/zdeneksoysterbar/" target="_blank" rel="noopener">Instagram</a><span style="opacity:0.4;">·</span><a href="https://www.facebook.com/zdeneksoyster" target="_blank" rel="noopener">Facebook</a>
  </div>
</div>

<script src="script.js?v=9"></script>
<!-- Netlify Identity — zpracuje odkaz z pozvánky/obnovy hesla a přesměruje do /admin/ -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function (user) {
      if (!user) {
        window.netlifyIdentity.on("login", function () { document.location.href = "/admin/"; });
      }
    });
  }
</script>
</body>
</html>
